<svg width="300px" height="300px" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect id="Rectangle1" stroke="#979797" fill="#00D8FF" opacity="1.0" x="0" y="0" width="300" height="300">
            	<animate attributeType="XML" attributeName="x" from="0" to="300" dur="3s" repeatCount="indefinite"/>
        </rect>
        <image xlink:href="mount.png" x="0" y="0" width="100" height="100" />
        <text id="HELLO" font-family="Bebas" font-size="72" font-weight="normal" fill="#1F363B">
            <tspan x="0" y="130">HELLO
				<animate attributeType="XML" attributeName="y" from="0" to="120" dur="2s" repeatCount="indefinite"/>
            </tspan>
            <tspan x="0" y="200">WORLD</tspan>
        </text>
    </g>
</svg>